<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atoms in a Grid</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <canvas id="scene" aria-label="Interactive atom lattice simulation"></canvas>

    <aside class="panel" aria-label="Simulation controls">
      <div class="panel__header">
        <h1>Atoms in a Grid</h1>
        <button id="pauseButton" type="button">Pause</button>
      </div>

      <div class="control-grid">
        <label>
          Width
          <input id="widthInput" type="number" min="2" max="14" step="1">
        </label>
        <label>
          Height
          <input id="heightInput" type="number" min="2" max="14" step="1">
        </label>
        <label>
          Depth
          <input id="depthInput" type="number" min="2" max="14" step="1">
        </label>
        <label>
          Bond length
          <input id="restLengthInput" type="number" min="24" max="120" step="2">
        </label>
        <label>
          Atom radius
          <input id="atomRadiusInput" type="number" min="3" max="18" step="1">
        </label>
        <label>
          Stiffness
          <input id="stiffnessInput" type="range" min="0.05" max="1" step="0.01">
        </label>
        <label>
          Bend stiffness
          <input id="bendStiffnessInput" type="range" min="0" max="1" step="0.01">
        </label>
        <label>
          Damping
          <input id="dampingInput" type="range" min="0.85" max="0.999" step="0.001">
        </label>
        <label>
          Iterations
          <input id="iterationsInput" type="number" min="1" max="20" step="1">
        </label>
      </div>

      <div class="actions">
        <button id="resetButton" type="button">Reset</button>
        <button id="rebuildButton" type="button">Rebuild</button>
      </div>
    </aside>
  </main>

  <script src="./src/config.js"></script>
  <script src="./src/math/vec3.js"></script>
  <script src="./src/math/camera.js"></script>
  <script src="./src/math/projection.js"></script>
  <script src="./src/simulation/Atom.js"></script>
  <script src="./src/simulation/Bond.js"></script>
  <script src="./src/simulation/BendingConstraint.js"></script>
  <script src="./src/simulation/Lattice.js"></script>
  <script src="./src/simulation/VerletSolver.js"></script>
  <script src="./src/simulation/EnergyModel.js"></script>
  <script src="./src/rendering/DrawStyle.js"></script>
  <script src="./src/rendering/CanvasRenderer.js"></script>
  <script src="./src/input/PointerController.js"></script>
  <script src="./src/input/OrbitController.js"></script>
  <script src="./src/input/DragController.js"></script>
  <script src="./src/ui/ControlPanel.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
